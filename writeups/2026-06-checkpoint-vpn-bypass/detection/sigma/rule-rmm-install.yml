title: Unauthorized RMM Tool Installation - AnyDesk or Splashtop
id: c9e3f562-1a4d-4b2e-c103-0f5g7d9b2e3f
status: experimental
description: >
  Detects service installation events for known RMM tools (AnyDesk, Splashtop)
  which have been observed as persistence mechanisms following CVE-2026-50751
  exploitation. Flag when installed outside of approved change windows or
  by non-IT-service accounts.
references:
  - https://support.checkpoint.com/results/sk/sk185033
  - https://github.com/threatsignal/Intel/tree/main/writeups/2026-06-checkpoint-vpn-bypass
author: ThreatSignal Research
date: 2026/06/10
logsource:
  product: windows
  service: system
  definition: 'Event ID 7045 - new service installed'
detection:
  selection:
    EventID: 7045
    ServiceName|contains:
      - 'AnyDesk'
      - 'Splashtop'
  condition: selection
falsepositives:
  - Legitimate IT deployments of AnyDesk or Splashtop (correlate with ITSM change records)
level: high
tags:
  - attack.persistence
  - attack.t1219
