title: Post-VPN Internal Reconnaissance Commands (CVE-2026-50751)
id: b7d2e451-8f3c-4a1d-b092-9e4f6c8a1d2e
status: experimental
description: >
  Detects execution of common Windows reconnaissance tools (nltest, arp)
  from a process context associated with VPN session activity. May indicate
  post-exploitation recon following CVE-2026-50751 exploitation.
references:
  - https://support.checkpoint.com/results/sk/sk185033
  - https://github.com/threatsignal/Intel/tree/main/writeups/2026-06-checkpoint-vpn-bypass
author: ThreatSignal Research
date: 2026/06/10
logsource:
  category: process_creation
  product: windows
detection:
  recon_commands:
    CommandLine|contains:
      - 'nltest /dclist'
      - 'nltest /domain_trusts'
      - 'arp -a'
      - 'net view /domain'
  timeframe: 5m
  condition: recon_commands
falsepositives:
  - Legitimate IT administrator activity (correlate with known admin accounts and scheduled tasks)
  - Domain join processes
level: medium
tags:
  - attack.discovery
  - attack.t1018
  - attack.t1482
