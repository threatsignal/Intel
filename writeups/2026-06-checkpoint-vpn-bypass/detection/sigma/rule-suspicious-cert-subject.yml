title: Suspicious Check Point VPN Authentication Subject (CVE-2026-50751)
id: d4e1c238-1f4b-4a5d-b092-2d8e4f1a2c3b
status: experimental
description: >
  Detects Check Point Remote Access VPN authentication events containing suspicious
  certificate subject names or usernames (e.g., CN=Default, CN=Defautl, CN=usertest)
  historically observed in active exploitation of CVE-2026-50751.
references:
  - https://support.checkpoint.com/results/sk/sk185033
  - https://github.com/threatsignal/Intel/tree/main/writeups/2026-06-checkpoint-vpn-bypass
author: ThreatSignal Research
date: 2026/06/13
logsource:
  product: checkpoint
  service: vpn
detection:
  selection_subject:
    Message|contains:
      - 'CN=Default'
      - 'CN=Defautl'
      - 'CN=usertest'
  selection_user:
    SourceUserName:
      - 'Default'
      - 'Defautl'
      - 'usertest'
  condition: selection_subject or selection_user
falsepositives:
  - Legitimate testing using default/test certificate names in isolated lab environments
level: critical
tags:
  - attack.initial_access
  - attack.t1190
  - cve.2026-50751
